# Interne nginx-Konfiguration für das Frontend-Container
# (Dient nur statische Dateien aus, SPA-Routing via try_files)
server {
    listen 80;
    root /usr/share/nginx/html;

    # Komprimierung aktivieren
    gzip on;
    gzip_types text/plain text/html text/css application/javascript
               application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # SPA: Unbekannte Pfade → index.html (Expo Router übernimmt Client-Routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-Header für statische Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
