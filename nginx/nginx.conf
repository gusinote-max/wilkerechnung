# ============================================================
# Candis-Kopie – Nginx Reverse Proxy Konfiguration
# Routen:
#   /api/*  →  FastAPI Backend  (backend:8001)
#   /*      →  Expo Web Frontend (frontend:80)
# ============================================================

events {
    worker_connections 1024;
}

http {
    # Erhöhtes Limit für Rechnungs-PDFs (max. 50 MB)
    client_max_body_size 50M;

    # Timeouts für KI/OCR-Verarbeitung (kann länger dauern)
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout  75s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Upstream-Definitionen (Service-Namen aus docker-compose)
    upstream backend {
        server backend:8001;
    }

    upstream frontend {
        server frontend:80;
    }

    # ---- HTTP Server ----
    server {
        listen 80;
        server_name _;

        # --- Backend API ---
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- Frontend SPA ---
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }

    # ============================================================
    # HTTPS-Konfiguration (aktivieren nach SSL-Zertifikat-Einrichtung)
    # Empfohlen: Certbot mit Let's Encrypt
    # Befehl: sudo certbot certonly --standalone -d IhreDomain.com
