version: "3.9"

# ============================================================
# Autohaus Wilke – Docker Compose (Produktion)
# Einsatz: docker compose up -d --build
# Traefik: Routing via Labels (Host-Netzwerk-Modus)
# ============================================================

services:

  # ---- MongoDB (intern, kein öffentlicher Port) ----
  mongo:
    image: mongo:7-jammy
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - candis_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- FastAPI Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Überschreibt MONGO_URL aus .env mit internem Service-Namen
      MONGO_URL: mongodb://mongo:27017/invoice_management
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - candis_net

  # ---- Expo Web Frontend (statischer Build via nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leer = alle API-Aufrufe gehen als /api/... (wird von nginx geroutet)
        EXPO_PUBLIC_BACKEND_URL: ""
    restart: unless-stopped
    networks:
      - candis_net

  # ---- Nginx Reverse Proxy (einziger öffentlicher Endpunkt) ----
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"    # Direktzugriff als Fallback (IP:8080 bleibt erreichbar)
    labels:
      # Traefik: Domain-Routing + automatisches HTTPS via Let's Encrypt
      - "traefik.enable=true"
      # HTTPS-Router (Hauptrouter)
      - "traefik.http.routers.wilke.rule=Host(`rechnung.autohaus-wilke.info`)"
      - "traefik.http.routers.wilke.entrypoints=websecure"
      - "traefik.http.routers.wilke.tls=true"
      - "traefik.http.routers.wilke.tls.certresolver=letsencrypt"
      # Service: Traefik leitet an nginx Port 80 weiter
      - "traefik.http.services.wilke.loadbalancer.server.port=80"
    depends_on:
      - backend
      - frontend
    networks:
      - candis_net

volumes:
  mongo_data:
    driver: local

networks:
  candis_net:
    driver: bridge
